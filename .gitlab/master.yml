---
default:
  interruptible: true

stages:
  - lint
  - docs
  - deptycheck

super_linter:
  stage: lint
  needs: []
  image:
    ################################################################################
    ## Version below must be in sync with `.github/workflows/ci-super-linter.yml` ##
    ################################################################################
    name: ghcr.io/super-linter/super-linter:slim-v8.7.0
  script: [ "true" ]
  variables:
    RUN_LOCAL: "true"
    DEFAULT_BRANCH: HEAD
    DEFAULT_WORKSPACE: $CI_PROJECT_DIR

    ###############################################################################
    ## Config below must be in sync with `.github/workflows/ci-super-linter.yml` ##
    ###############################################################################

    IGNORE_GENERATED_FILES: true
    SAVE_SUPER_LINTER_SUMMARY: true # Required for generating linting reports in PR

    VALIDATE_PYTHON_BLACK: false # Avoid conflict: Ruff is preferred
    VALIDATE_GIT_COMMITLINT: false

    VALIDATE_MARKDOWN_PRETTIER: false # We use markdownlint
    VALIDATE_YAML_PRETTIER: false # We use yamllint

    # Disable Biome
    VALIDATE_BIOME_FORMAT: false
    VALIDATE_BIOME_LINT: false

shell_check:
  stage: lint
  needs: []
  image: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/ubuntu:latest
  script:
    - apt-get -qq update && apt-get -qqy install python3 shellcheck
    - .github/linters/do-shell-check.sh

deptycheck:docs:
  stage: docs
  image: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/sphinxdoc/sphinx:latest
  needs: []
  script:
    - pip3 install -r docs/requirements.txt
    - alias sh=bash
    # - pack build docs # `pack` is unaccessible here, thus:
    - cd docs && eval "$(grep prebuild docs.ipkg | sed 's/.*"\(.*\)"/\1/')"

deptycheck:prepare-pipeline:
  stage: deptycheck
  needs: []
  image: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/ubuntu:latest
  script:
    - >
      TEST_SETS="$(
        find tests/ -type f,l -name run | grep -v '/_' |
          sed -e 's|^tests/|"|' -e 's|\(.*\)distribution/\([^-]*\)-[^/]*/run|\1distribution/\2-"|' -e 's|/[^/]*/run$|"|' |
          sort | uniq | awk 'ORS=", "' | head -c -2
      )"
    - >
      EXAMPLES_SET="$(
        find examples/ -mindepth 1 -maxdepth 1 -type d |
          sed 's|^examples/|"|' | sed 's|$|"|' |
          sort | uniq | awk 'ORS=", "' | head -c -2
      )"
    - >
      sed -e "s|TEST_SETS|$TEST_SETS|" \
        -e "s|EXAMPLES_SET|$EXAMPLES_SET|" \
        -e 's|\$CI_PIPELINE_SOURCE|'"$CI_PIPELINE_SOURCE|" \
        .gitlab/deptycheck.yml > deptycheck-generated.yml
  artifacts:
    paths:
      - deptycheck-generated.yml
deptycheck:run-pipeline:
  stage: deptycheck
  needs: [ deptycheck:prepare-pipeline ]
  trigger:
    include:
      - job: deptycheck:prepare-pipeline
        artifact: deptycheck-generated.yml
