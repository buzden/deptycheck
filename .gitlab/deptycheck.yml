---
default:
  image: ghcr.io/stefan-hoeck/idris2-pack:latest
  interruptible: true
  before_script:
    - find . -name '.pack.*.tar' -exec .github/tar-pack restore '{}' \;
  after_script:
    - rm -f .pack.*.tar
    - |
      if [[ "$CI_JOB_NAME" =~ ":build" || "$CI_JOB_NAME" =~ "pack:" ]]; then
        .github/tar-pack save-pack "$CI_PROJECT_DIR/.pack.${CI_JOB_NAME/:/-}.tar"
      fi
  artifacts:
    paths:
      - "**/build/**/*.tt[cm]"
      - ".pack.*.tar"
    expire_in: 3 hrs

pack:prepare:
  stage: .pre
  script:
    - pack update-db
    - pack switch "$( if [[ "$CI_PIPELINE_SOURCE" == 'schedule' ]]; then echo HEAD; else ./.pack-collection; fi )"
    - ./.patch-chez-gc-handler idris2

stages:
  - deptycheck:build
  - elab-util-extra:test
  - examples
  - deptycheck:test

thirdparties:build:
  stage: deptycheck:build
  needs:
    - pack:prepare
  script:
    - pack install-deps deptycheck
    - pack install summary-stat # for distr tests
      # TODO to compute test dependencies when we have special mini-test libs

elab-util-extra:test:
  stage: elab-util-extra:test
  needs:
    - thirdparties:build
  script:
    - pack test elab-util-extra

deptycheck:build:
  stage: deptycheck:build
  needs:
    - thirdparties:build
  script:
    - pack build deptycheck
    - pack install deptycheck

deptycheck:test:
  stage: deptycheck:test
  needs:
    - deptycheck:build
  parallel:
    matrix:
      - TEST_SET: [ TEST_SETS ]
  script:
    - apt-get -qq update && apt-get -qqy install python3
    - pack test deptycheck "$TEST_SET"

example:build-and-test:
  stage: examples
  needs:
    - deptycheck:build
  parallel:
    matrix:
      - EXAMPLE: [ EXAMPLES_SET ]
  script:
    - pack build "$EXAMPLE"
    - pack test "$EXAMPLE"
