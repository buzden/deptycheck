---
name: Lint

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:
    branches:
      - main
      - master
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}@${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint Code Base
    permissions:
      contents: read
      statuses: write
      # issues and pull-requests permissions to write results as pull request comments
      issues: write
      pull-requests: write
    # Disable PR from the same repo
    if: github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full git history is needed to get a proper
          # list of changed files within `super-linter`
          fetch-depth: 0
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked

      - name: Lint Code Base
        uses: super-linter/super-linter/slim@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
        env:
          DEFAULT_BRANCH: master
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IGNORE_GENERATED_FILES: true
          SAVE_SUPER_LINTER_SUMMARY: true # Required for generating linting reports in PR

          VALIDATE_PYTHON_BLACK: false # Avoid conflict: Ruff is preferred
          VALIDATE_GIT_COMMITLINT: false

          VALIDATE_MARKDOWN_PRETTIER: false # We use markdownlint
          VALIDATE_YAML_PRETTIER: false # We use yamllint

          # Disable Biome
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false

  shellcheck-extra:
    name: ShellCheck non-standard shell file names
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: ShellCheck
        shell: bash
        run: |
          set -e

          # Find .editorconfig section header that mentions *.sh
          header=$(grep -F '*.sh' .editorconfig)

          # Get comma-separated patterns
          patterns=${header#\[\{}
          patterns=${patterns%\}\]}

          # Build `-name p1 -o -name p2 ...`
          args=$(python3 -c "import sys; print(' -o '.join(f'-name {p}' for p in sys.argv[1].split(',')))" "$patterns")

          # Run shellcheck on matching files
          # shellcheck disable=SC2086  # word splitting intended to split string into separate find args
          find . -type f \( $args \) -exec shellcheck --shell=sh -S warning {} +
