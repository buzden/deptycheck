---
name: DepTyCheck

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:
    branches:
      - main
      - master
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    # We want to run in the beginning of the day, right after the `pack` collection is built at the end of the previous day.
    - cron: "0 1 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}@${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# TODO to reduce duplication, e.g. by using https://docs.github.com/en/actions/using-workflows/reusing-workflows

jobs:

  ##############
  # Validation #
  ##############

  validate_trigger:
    name: Validate trigger
    # Disable scheduled running on forks and PRs from the same repo
    if: github.event_name != 'schedule' && github.event_name != 'pull_request' ||
        github.event_name == 'schedule' && github.repository_owner == 'buzden' ||
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest
    steps:
      - name: No-op step
        run: echo "This job exists only for validation."

  get-pack-collection:
    name: Select pack collection
    needs: validate_trigger
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    outputs:
      pack_collections: ${{ steps.collection.outputs.pack_collections }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name != 'schedule'
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked

      - name: Select pack collection
        id: collection
        run: |
          if [[ '${{ github.event_name }}' == 'schedule' ]]; then
            COLLECTION="HEAD"
          else
            COLLECTION=$(./.pack-collection)
          fi

          echo "pack_collections=[\"$COLLECTION\"]" >> "$GITHUB_OUTPUT"

  ############################
  # Build DepTyCheck library #
  ############################

  deptycheck-build-lib:
    name: Build the lib
    needs: get-pack-collection
    uses: DepTyCheck/idris2-actions/.github/workflows/build-and-test.yml@master
    with:
      pack_collections: ${{ needs.get-pack-collection.outputs.pack_collections }}
      run_tests: false

  install-extra-deps:
    name: Install extra deps
    needs: deptycheck-build-lib
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    outputs:
      pack_state: ${{ steps.upload-pack-state.outputs.state }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked

      - name: Restore built DepTyCheck
        uses: DepTyCheck/idris2-actions/.github/actions/restore-pack-state@master
        with:
          state: ${{ fromJSON(needs.deptycheck-build-lib.outputs.pack_states)[0] }}

      - run: pack install summary-stat # for distr tests
             # TODO to compute test dependencies when we have special mini-test libs
      - run: sleep 2 # avoid such error during next step. tar: /root/.cache/pack: file changed as we read it
      - name: Upload state with extra deps
        id: upload-pack-state
        uses: DepTyCheck/idris2-actions/.github/actions/upload-pack-state@master
        with:
          package: ${{ needs.deptycheck-build-lib.outputs.package }}
          collection: ${{ fromJSON(needs.deptycheck-build-lib.outputs.collections)[0] }}
          label: extra-deps
          project_dir: ${{ needs.deptycheck-build-lib.outputs.project_dir }}
          build_dir: ${{ needs.deptycheck-build-lib.outputs.build_dir }}

  ########################
  # Test elab-util-extra #
  ########################

  elab-util-extra-test:
    name: Test elab-util-extra
    needs: install-extra-deps
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked
      - name: Restore state with extra deps
        uses: DepTyCheck/idris2-actions/.github/actions/restore-pack-state@master
        with:
          state: ${{ needs.install-extra-deps.outputs.pack_state }}

      - run: pack test elab-util-extra

  ###########################
  # Build DepTyCheck's docs #
  ###########################

  deptycheck-build-docs:
    name: Build the docs
    needs: validate_trigger
    runs-on: ubuntu-latest
    container: sphinxdoc/sphinx:latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked
      - name: Install dependencies
        run: pip3 install -r docs/requirements.txt
      - run: alias sh=bash
      # - run: pack build docs # `pack` is unaccessible here, thus:
      - run: cd docs && eval "$(grep prebuild docs.ipkg | sed 's/.*"\(.*\)"/\1/')"

  ###################
  # Test DepTyCheck #
  ###################

  get-test-sets:
    name: Acquire test sets
    needs: validate_trigger
    runs-on: ubuntu-latest
    outputs:
      test-sets: ${{ steps.get-test-sets.outputs.test-sets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked
      - name: Get test sets
        id: get-test-sets
        run: |
          (
          echo -n "test-sets=["
          find tests/ -type f,l -name run | grep -v '/_' | \
            sed -e 's|^tests/|"|' -e 's|\(.*\)distribution/\([^-]*\)-[^/]*/run|\1distribution/\2-"|' -e 's|/[^/]*/run$|"|' | \
            sort | uniq | awk 'ORS=", "' | head -c -2
          echo "]"
          ) >> "$GITHUB_OUTPUT"

  deptycheck-test:
    name: Test the lib
    needs:
      - install-extra-deps
      - get-test-sets
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    strategy:
      fail-fast: false # all test cases are more or less independent
      matrix:
        test_set: ${{ fromJSON(needs.get-test-sets.outputs.test-sets) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked
      - name: Restore state with extra deps
        uses: DepTyCheck/idris2-actions/.github/actions/restore-pack-state@master
        with:
          state: ${{ needs.install-extra-deps.outputs.pack_state }}

      - name: Sleep a random bit
        run: sleep "$(shuf -i 0-10 -n 1)"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Run tests for ${{ matrix.test_set }}
        run: pack test deptycheck "${TEST_SET}"
        env:
          TEST_SET: ${{ matrix.test_set }}

  #################
  # Test examples #
  #################

  get-examples:
    name: Acquire examples
    needs: validate_trigger
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.get-examples.outputs.examples }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked
      - name: Get examples
        id: get-examples
        run: |
          (
          echo -n "examples=["
          find examples/ -mindepth 1 -maxdepth 1 -type d | \
            sed 's|^examples/|"|' | sed 's|$|"|' | \
            sort | uniq | awk 'ORS=", "' | head -c -2
          echo "]"
          ) >> "$GITHUB_OUTPUT"

  examples-build:
    name: Build and test examples
    needs:
      - install-extra-deps
      - get-examples
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    strategy:
      fail-fast: false # all test cases are more or less independent
      matrix:
        example: ${{ fromJSON(needs.get-examples.outputs.examples) }}
    env:
      EXAMPLE_NAME: ${{ matrix.example }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked
      - name: Restore state with extra deps
        uses: DepTyCheck/idris2-actions/.github/actions/restore-pack-state@master
        with:
          state: ${{ needs.install-extra-deps.outputs.pack_state }}

      - name: Sleep a random bit
        run: sleep "$(shuf -i 0-10 -n 1)"

      - name: Build ${{ matrix.example }}
        run: pack build "${EXAMPLE_NAME}"
      - name: Test ${{ matrix.example }}
        run: pack test "${EXAMPLE_NAME}"
